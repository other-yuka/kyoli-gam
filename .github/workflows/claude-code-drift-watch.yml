name: Claude Code drift watch

on:
  schedule:
    - cron: "0 0-1,3-23 * * *"
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: Bypass the version cache and run the full drift check
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  actions: write
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version_check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.probe.outputs.version }}
      should_run: ${{ steps.gate.outputs.should_run }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Fetch latest Claude Code version
        id: probe
        run: |
          set +e
          VERSION=$(curl -sS --fail --max-time 15 \
            https://registry.npmjs.org/@anthropic-ai/claude-code/latest \
            | node -pe "JSON.parse(require('fs').readFileSync(0, 'utf8')).version" 2>/dev/null)
          EXIT=$?
          set -e
          if [ $EXIT -ne 0 ] || [ -z "$VERSION" ]; then
            echo "::warning::npm registry probe failed (exit=$EXIT). Running the full check."
            echo "version=unknown-fail-open" >> "$GITHUB_OUTPUT"
          else
            echo "Claude Code latest on npm: $VERSION"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Gate drift check
        id: gate
        run: |
          FORCED='${{ github.event_name == 'workflow_dispatch' && inputs.force == 'true' }}'
          VERSION='${{ steps.probe.outputs.version }}'
          EVENT='${{ github.event.schedule }}'
          BUNDLED=$(node -p "require('./packages/providers/claude-code/src/fingerprint/data.json').cc_version")

          if [ "$FORCED" = "true" ]; then
            echo "Manual force=true; running."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [ "$VERSION" = "unknown-fail-open" ]; then
            echo "Version probe failed; running."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT" = "0 2 * * *" ]; then
            echo "Daily static OAuth/scanner fallback; running even when latest matches the bundle."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [ "$VERSION" = "$BUNDLED" ]; then
            echo "Claude Code v$VERSION already matches bundled fingerprint v$BUNDLED. Skipping hourly scan."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "Claude Code target v$VERSION differs from bundled v$BUNDLED. Running."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  drift:
    needs: version_check
    if: needs.version_check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    outputs:
      exit_code: ${{ steps.drift.outputs.exit_code }}
      cc_version: ${{ steps.version.outputs.cc_version }}
      should_open_issue: ${{ steps.classify.outputs.should_open_issue }}
      should_dispatch_live: ${{ steps.classify.outputs.should_dispatch_live }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Claude OpenCode package
        run: pnpm --filter opencode-anthropic-multi-account build

      - name: Run static Claude Code drift check
        id: drift
        env:
          CLAUDE_CODE_TARGET_VERSION: ${{ needs.version_check.outputs.version }}
        run: |
          set +e
          node packages/anthropic-multi-account/scripts/check-claude-code-static-oauth-drift.mjs \
            > drift-report.json 2> drift-log.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e
          cat drift-log.txt
          echo "--- drift report ---"
          cat drift-report.json

      - name: Extract Claude Code version
        if: always()
        id: version
        run: |
          CC_VERSION=$(node -e "try { console.log(JSON.parse(require('fs').readFileSync('drift-report.json','utf8')).ccVersion || 'unknown') } catch { console.log('unknown') }")
          echo "cc_version=$CC_VERSION" >> "$GITHUB_OUTPUT"

      - name: Classify drift handling
        if: steps.drift.outputs.exit_code != '0'
        id: classify
        run: |
          node packages/anthropic-multi-account/scripts/plan-static-claude-code-drift.mjs \
            drift-report.json \
            drift-plan.json
          cat drift-plan.json

      - name: Upload drift artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: claude-code-drift-report
          path: |
            drift-report.json
            drift-log.txt
            drift-plan.json
          if-no-files-found: ignore
          retention-days: 30

  dispatch_live_validation:
    needs: drift
    if: needs.drift.outputs.should_dispatch_live == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      issues: write
    steps:
      - name: Dispatch exact-version live classification
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_VERSION: ${{ needs.drift.outputs.cc_version }}
        run: |
          set -euo pipefail
          if ! [[ "$TARGET_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Refusing to dispatch live validation without a concrete target version: $TARGET_VERSION"
            exit 1
          fi
          if ! dispatch_error=$(gh workflow run claude-code-live-template-watch.yml \
            --repo "${{ github.repository }}" \
            --ref main \
            -f target_version="$TARGET_VERSION" \
            -f source_run_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            2>&1); then
            gh label create claude-code-automation-failure \
              --repo "${{ github.repository }}" \
              --color B60205 \
              --description "Claude Code automatic update pipeline needs intervention" \
              2>/dev/null || true
            title="Claude Code automation failed: v${TARGET_VERSION}"
            body_file=$(mktemp)
            {
              echo "## Claude Code live validation dispatch failed"
              echo ""
              echo "Static drift classification required exact-version live validation, but GitHub did not accept the dispatch."
              echo ""
              echo "- Target: \`${TARGET_VERSION}\`"
              echo "- Run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
              echo "- Error: \`${dispatch_error}\`"
            } > "$body_file"
            existing=$(gh issue list \
              --repo "${{ github.repository }}" \
              --label claude-code-automation-failure \
              --state open \
              --search "in:title \"${title}\"" \
              --json number \
              --jq '.[0].number // ""')
            if [ -n "$existing" ]; then
              gh issue edit "$existing" --repo "${{ github.repository }}" --body-file "$body_file"
            else
              gh issue create \
                --repo "${{ github.repository }}" \
                --title "$title" \
                --label claude-code-automation-failure \
                --body-file "$body_file"
            fi
            echo "::error::Failed to dispatch exact-version live validation: $dispatch_error"
            exit 1
          fi
          echo "Dispatched exact-version live classification for Claude Code v$TARGET_VERSION."

  manual_issue:
    needs: drift
    if: needs.drift.outputs.should_open_issue == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: claude-code-drift-report

      - name: Render issue body
        run: |
          node packages/anthropic-multi-account/scripts/render-claude-code-drift-issue.mjs \
            drift-report.json \
            issue-body.md

      - name: Ensure drift label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create claude-code-drift \
            --color FBCA04 \
            --description "Claude Code package drift requires kyoli compatibility review" \
            2>/dev/null || true
          gh label create claude-code-static-drift \
            --color D93F0B \
            --description "Claude Code static OAuth or scanner drift requires manual review" \
            2>/dev/null || true

      - name: Open or update manual drift issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CC_VERSION="${{ needs.drift.outputs.cc_version }}"
          TITLE="Claude Code drift detected: v${CC_VERSION}"
          LEGACY_TITLE="Fingerprint drift detected: Claude Code v${CC_VERSION}"
          EXISTING=$(gh issue list --label claude-code-static-drift --state open --search "in:title \"${TITLE}\"" --json number --jq '.[0].number')
          if [ -z "$EXISTING" ]; then
            EXISTING=$(gh issue list --label fingerprint-drift --state open --search "in:title \"${LEGACY_TITLE}\"" --json number --jq '.[0].number' 2>/dev/null || true)
          fi

          if [ -z "$EXISTING" ]; then
            gh issue create \
              --title "$TITLE" \
              --label claude-code-drift \
              --label claude-code-static-drift \
              --body-file issue-body.md
          else
            # Keep one drift issue per Claude Code version. Updating the body preserves
            # the latest run link without adding a duplicate notification comment on
            # the daily fallback schedule.
            gh issue edit "$EXISTING" \
              --add-label claude-code-drift \
              --add-label claude-code-static-drift \
              --body-file issue-body.md
          fi

  close_resolved_issues:
    needs:
      - version_check
      - drift
    if: >-
      always() &&
      needs.version_check.outputs.should_run == 'true' &&
      needs.drift.result == 'success' &&
      needs.drift.outputs.exit_code == '0' &&
      needs.drift.outputs.cc_version != '' &&
      needs.drift.outputs.cc_version != 'unknown'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Close resolved drift issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CC_VERSION="${{ needs.drift.outputs.cc_version }}"
          if [ -z "$CC_VERSION" ] || [ "$CC_VERSION" = "unknown" ]; then
            echo "::notice::Skipping drift issue closure because no concrete Claude Code version was checked."
            exit 0
          fi
          gh issue list \
            --repo "${{ github.repository }}" \
            --label claude-code-static-drift \
            --state open \
            --json number,title \
            > static-drift-issues.json
          node packages/anthropic-multi-account/scripts/select-superseded-claude-code-issues.mjs \
            static-drift-issues.json \
            "$CC_VERSION" \
            > drift-issue-numbers.txt
          COMMENT="Resolved: superseded by clean static Claude Code scan for v${CC_VERSION}."
          while IFS= read -r n; do
            if [ -z "$n" ]; then
              continue
            fi
            gh issue close "$n" --repo "${{ github.repository }}" --comment "$COMMENT"
          done < drift-issue-numbers.txt
