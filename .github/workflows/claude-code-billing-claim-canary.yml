name: Claude Code billing claim canary

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:
    inputs:
      model:
        description: Optional Claude Code model id for the canary request
        required: false
        default: "anthropic/claude-opus-4-8"
      force_status:
        description: Override verdict for workflow path validation only
        required: false
        type: choice
        default: none
        options:
          - none
          - pass
          - warn
          - fail

permissions:
  contents: read
  issues: write

concurrency:
  group: claude-code-billing-claim-canary
  cancel-in-progress: false

jobs:
  billing_claim:
    if: github.ref == 'refs/heads/main' && vars.KYOLI_CLAUDE_BILLING_CLAIM_CANARY_ENABLED == 'true'
    runs-on: [self-hosted, claude-auth]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm --filter @kyoli-gam/cli... build

      - name: Run billing claim doctor
        id: check
        env:
          KYOLI_CLAUDE_BILLING_CLAIM_MODEL: ${{ github.event.inputs.model || 'anthropic/claude-opus-4-8' }}
          FORCE_STATUS: ${{ github.event.inputs.force_status || 'none' }}
        run: |
          if [ "$FORCE_STATUS" != "none" ]; then
            node - "$FORCE_STATUS" > billing-claim.json <<'NODE'
          const status = process.argv[2];
          const summary = status === "fail"
            ? { pass: 3, warn: 0, fail: 1 }
            : status === "warn"
              ? { pass: 3, warn: 1, fail: 0 }
              : { pass: 4, warn: 0, fail: 0 };
          const checkStatus = status === "fail" ? "fail" : status === "warn" ? "warn" : "pass";
          console.log(JSON.stringify({
            name: "claude/billing-claim",
            summary,
            checks: [
              { name: "forced verdict", status: checkStatus, detail: `force_status=${status}` },
              { name: "billing claim", status: checkStatus, detail: `claim=forced-${status} status=forced` },
            ],
          }, null, 2));
          NODE
            case "$FORCE_STATUS" in
              pass) code=0 ;;
              warn) code=2 ;;
              fail) code=1 ;;
              *) echo "Unsupported force_status=$FORCE_STATUS" >&2; exit 64 ;;
            esac
          else
            set +e
            node packages/cli/dist/index.js doctor claude --billing-claim --model "$KYOLI_CLAUDE_BILLING_CLAIM_MODEL" --json > billing-claim.json 2> billing-claim.err
            code=$?
            set -e
          fi

          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" -eq 0 ] || [ "$code" -eq 1 ] || [ "$code" -eq 2 ]; then
            jq '{
              name,
              verdict: (if .summary.fail > 0 then "fail" elif .summary.warn > 0 then "warn" else "pass" end),
              checks: [.checks[] | select(
                .name == "forced verdict"
                or .name == "http status"
                or .name == "billing claim"
                or .name == "served model"
              )]
            }' billing-claim.json > billing-claim-public.json
            rm -f billing-claim.json billing-claim.err
            if [ "$code" -eq 0 ]; then
              jq -r '[.checks[] | select(.name == "billing claim" or .name == "served model") | .detail]
                | "Canary healthy: " + join(" | ")' billing-claim-public.json
            else
              cat billing-claim-public.json
            fi
            exit 0
          fi
          echo "::error::billing claim doctor failed before producing a report (exit code ${code})"
          rm -f billing-claim.json billing-claim.err
          exit "$code"

      - name: Open or update billing claim issue
        if: steps.check.outputs.exit_code == '1' || steps.check.outputs.exit_code == '2'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create claude-code-drift \
            --color FBCA04 \
            --description "Claude Code package drift requires kyoli compatibility review" \
            2>/dev/null || true

          if [ "${{ steps.check.outputs.exit_code }}" = "2" ]; then
            verdict="warning"
            title="Claude Code billing claim canary warning"
          else
            verdict="failed"
            title="Claude Code billing claim canary failed"
          fi

          body_file=$(mktemp)
          {
            echo "## Claude Code billing claim canary ${verdict}"
            echo ""
            echo "The self-hosted billing claim canary ${verdict} on $(date -Iseconds)."
            echo "Run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo ""
            echo "### Fix checklist"
            echo ""
            echo "- [ ] Confirm the runner has a stored kyoli Claude Code OAuth account: \`pnpm --dir packages/cli run accounts list claude-code\`."
            echo "- [ ] Check whether \`anthropic-ratelimit-unified-representative-claim\` is subscription-backed, not API/overage/credit-backed."
            echo "- [ ] Do not hide non-subscription billing claims behind fallback; fix routing or re-auth the account."
            echo ""
            echo '```json'
            cat billing-claim-public.json
            echo '```'
          } > "$body_file"

          existing=$(gh issue list --label claude-code-drift --state open --search '"Claude Code billing claim canary" in:title' --json number --jq '.[0].number // ""')
          if [ -n "$existing" ]; then
            gh issue edit "$existing" --title "$title" --body-file "$body_file"
          else
            gh issue create --title "$title" --label claude-code-drift --body-file "$body_file"
          fi

      - name: Auto-close billing claim issue on clean run
        if: steps.check.outputs.exit_code == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue list --label claude-code-drift --state open --search '"Claude Code billing claim canary" in:title' --json number --jq '.[].number' | while read -r n; do
            [ -z "$n" ] && continue
            gh issue close "$n" --comment "Auto-closed: billing claim canary is clean on run https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID."
          done
