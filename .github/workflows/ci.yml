name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.2
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.2
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Test
        run: pnpm run test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.2
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm run build
      - name: Verify dist output
        run: |
          test -f packages/multi-account-core/dist/index.js
          test -f packages/anthropic-multi-account/dist/index.js
          test -f packages/codex-multi-account/dist/index.js

  build-node-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.2
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Build with pnpm
        run: pnpm run build
      - name: Verify dist loads on Node ${{ matrix.node-version }}
        run: |
          node --input-type=module -e "
            import('./packages/multi-account-core/dist/index.js').then(m => console.log('core ok:', Object.keys(m).length, 'exports'));
            import('./packages/anthropic-multi-account/dist/index.js').then(m => console.log('anthropic ok:', Object.keys(m).length, 'exports'));
            import('./packages/codex-multi-account/dist/index.js').then(m => console.log('codex ok:', Object.keys(m).length, 'exports'));
          "
