name: Fingerprint drift watch

# Hourly gated static scan of @anthropic-ai/claude-code@latest against the
# bundled OAuth constants in anthropic-multi-account. Does NOT require
# Claude Code authentication — npm pack + binary regex scan only. Opens
# a GitHub issue on drift so maintainers can rebake constants before
# users file bugs.

on:
  schedule:
    - cron: "0 * * * *"
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: Bypass the version cache (always run full check)
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version_check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.probe.outputs.version }}
      should_run: ${{ steps.gate.outputs.should_run }}
    steps:
      - name: Fetch CC latest version from npm registry
        id: probe
        run: |
          set +e
          VERSION=$(curl -sS --fail --max-time 15 \
            https://registry.npmjs.org/@anthropic-ai/claude-code/latest \
            | node -pe "JSON.parse(require('fs').readFileSync(0, 'utf8')).version" 2>/dev/null)
          EXIT=$?
          set -e
          if [ $EXIT -ne 0 ] || [ -z "$VERSION" ]; then
            echo "::warning::npm registry probe failed (exit=$EXIT). Failing open: heavy check will run."
            echo "version=unknown-fail-open" >> "$GITHUB_OUTPUT"
          else
            echo "CC latest on npm: $VERSION"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache sentinel (keyed on CC version)
        id: version_cache
        if: steps.probe.outputs.version != 'unknown-fail-open'
        uses: actions/cache@v5
        with:
          path: .cc-version-sentinel
          key: cc-drift-checked-${{ steps.probe.outputs.version }}

      - name: Gate full check
        id: gate
        run: |
          FORCED='${{ github.event_name == 'workflow_dispatch' && inputs.force == 'true' }}'
          VERSION='${{ steps.probe.outputs.version }}'
          CACHE_HIT='${{ steps.version_cache.outputs.cache-hit }}'
          EVENT='${{ github.event.schedule }}'

          if [ "$FORCED" = "true" ]; then
            echo "Manual force=true — running."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [ "$VERSION" = "unknown-fail-open" ]; then
            echo "npm registry probe failed; failing open."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT" = "0 2 * * *" ]; then
            echo "Daily fallback cron — running heavy check regardless of cache."
            touch .cc-version-sentinel
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [ "$CACHE_HIT" = "true" ]; then
            echo "CC v$VERSION already full-checked. Skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "CC v$VERSION is new — running heavy check."
            touch .cc-version-sentinel
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  check:
    needs: version_check
    if: needs.version_check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Install Playwright Chromium for headless probe
        run: |
          set +e
          npm install --no-save playwright@1.49.0
          npx playwright install chromium --with-deps
          exit 0

      - name: Run authorize-URL probe (headless Chromium)
        id: probe
        run: |
          set +e
          node packages/anthropic-multi-account/scripts/check-cc-authorize-probe-headless.mjs > probe-report.json 2> probe-log.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e
          cat probe-log.txt
          echo "--- report ---"
          cat probe-report.json

      - name: Run authorize-URL probe (fetch fallback, only if headless failed)
        if: steps.probe.outputs.exit_code == '2'
        run: |
          set +e
          node packages/anthropic-multi-account/scripts/check-cc-authorize-probe.mjs > probe-report.json 2> probe-log.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e
          cat probe-log.txt
          echo "--- report ---"
          cat probe-report.json

      - name: Run static drift check
        id: drift
        run: |
          set +e
          node packages/anthropic-multi-account/scripts/check-claude-code-static-oauth-drift.mjs \
            > drift-report.json 2> drift-log.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e
          cat drift-log.txt
          echo "--- report ---"
          cat drift-report.json

      - name: Extract Claude Code version from report
        if: always()
        id: ver
        run: |
          CC_VERSION=$(node -e "try { console.log(JSON.parse(require('fs').readFileSync('drift-report.json','utf-8')).ccVersion || 'unknown') } catch (e) { console.log('unknown') }")
          echo "cc_version=$CC_VERSION" >> "$GITHUB_OUTPUT"

      - name: Auto-patch compat range drift
        if: steps.drift.outputs.exit_code != '0'
        id: autopatch
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const report = JSON.parse(fs.readFileSync('drift-report.json', 'utf8'));
          const items = Array.isArray(report.items) ? report.items : [];
          const ccVersion = typeof report.ccVersion === 'string' ? report.ccVersion : '';
          const result = { shouldCreatePr: false, changedFiles: [], reason: '' };

          if (!ccVersion) {
            result.reason = 'missing ccVersion';
          } else if (items.length !== 1 || items[0]?.category !== 'compat.range') {
            result.reason = 'drift is not compat.range-only';
          } else {
            const capturePath = 'packages/anthropic-multi-account/src/claude-code/fingerprint/capture.ts';
            const changesetPath = `.changeset/cc-drift-${ccVersion.replace(/[^0-9A-Za-z.-]/g, '-')}.md`;
            const capture = fs.readFileSync(capturePath, 'utf8');
            const nextCapture = capture.replace(/maxTested: "[^"]+"/, `maxTested: "${ccVersion}"`);

            if (nextCapture !== capture) {
              fs.writeFileSync(capturePath, nextCapture);
              result.changedFiles.push(capturePath);
            }

            fs.mkdirSync(path.dirname(changesetPath), { recursive: true });
            fs.writeFileSync(
              changesetPath,
              `---\n"opencode-anthropic-multi-account": patch\n---\n\nUpdate the supported Claude Code compatibility range to ${ccVersion}.\n`,
            );
            result.changedFiles.push(changesetPath);
            result.shouldCreatePr = result.changedFiles.length > 0;
            result.reason = result.shouldCreatePr ? 'compat.range patched' : 'no file changes';
          }

          fs.writeFileSync('auto-draft-result.json', `${JSON.stringify(result, null, 2)}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `should_create_pr=${result.shouldCreatePr}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `changed_files=${JSON.stringify(result.changedFiles)}\n`);
          NODE
          cat auto-draft-result.json

      - name: Open compat range pull request
        if: steps.autopatch.outputs.should_create_pr == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGED_FILES_JSON: ${{ steps.autopatch.outputs.changed_files }}
        run: |
          set -euo pipefail
          CC_VERSION="${{ steps.ver.outputs.cc_version }}"
          BRANCH="cc-drift/max-tested-${CC_VERSION}"
          git config user.name "cc-drift-watch[bot]"
          git config user.email "actions@github.com"
          git fetch origin "$BRANCH:refs/remotes/origin/$BRANCH" || true
          git checkout -B "$BRANCH"
          node <<'NODE' > changed-files.txt
          const files = JSON.parse(process.env.CHANGED_FILES_JSON || '[]');
          for (const file of files) console.log(file);
          NODE
          while IFS= read -r file; do
            git add "$file"
          done < changed-files.txt
          git commit -m "chore(anthropic): update Claude Code compatibility range"
          git push --force-with-lease origin "$BRANCH"
          cat > pr-body.md <<EOF
          ## Summary
          - Update supported Claude Code compatibility range to ${CC_VERSION}.
          - Add a patch changeset for the Anthropic package.

          Generated by fingerprint-drift-watch after a compat.range-only drift report.
          EOF
          PR_URL=$(gh pr view "$BRANCH" --json url --jq .url 2>/dev/null || true)
          if [ -z "$PR_URL" ]; then
            PR_URL=$(gh pr create \
              --base "${GITHUB_REF_NAME}" \
              --head "$BRANCH" \
              --title "chore(anthropic): update Claude Code compatibility range" \
              --body-file pr-body.md)
          fi
          gh pr merge "$PR_URL" --auto --squash --delete-branch \
            || echo "Auto-merge could not be enabled; PR remains open: $PR_URL"

      - name: Ensure fingerprint-drift label exists
        if: steps.drift.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create fingerprint-drift \
            --color FBCA04 \
            --description "Claude Code fingerprint has drifted from bundled template" \
            2>/dev/null || true

      - name: Open or update drift issue
        if: steps.drift.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CC_VERSION="${{ steps.ver.outputs.cc_version }}"
          TITLE="Fingerprint drift detected: Claude Code v${CC_VERSION}"
          EXISTING=$(gh issue list --label fingerprint-drift --state open --search "in:title \"${TITLE}\"" --json number --jq '.[0].number')

          {
            echo "## Claude Code fingerprint drift"
            echo ""
            echo "\`.github/workflows/fingerprint-drift-watch.yml\` detected drift against \`@anthropic-ai/claude-code@${CC_VERSION}\` on \`$(date -u +'%Y-%m-%dT%H:%M:%SZ')\`."
            echo ""
            echo "### Why this matters"
            echo ""
            echo "The Anthropic plugin keeps a bundled Claude Code request fingerprint so fallback requests stay aligned with the installed Claude Code binary. When the upstream binary changes, the bundled template and supported-version guard must be refreshed together."
            echo ""
            echo "### Fix checklist"
            echo ""
            echo "- [ ] Install or update local Claude Code to \`${CC_VERSION}\`."
            echo "- [ ] Run \`bun run --cwd packages/anthropic-multi-account bake:fingerprint\`."
            echo "- [ ] Commit the updated \`packages/anthropic-multi-account/src/claude-code/fingerprint/data.json\`."
            echo "- [ ] If the static report only flags \`compat.range\`, update \`SUPPORTED_CC_RANGE.maxTested\` in \`packages/anthropic-multi-account/src/claude-code/fingerprint/capture.ts\`."
            echo "- [ ] Add a patch changeset for \`opencode-anthropic-multi-account\` when the package should be released."
            echo "- [ ] Verify \`bun run --cwd packages/anthropic-multi-account check:fingerprint-drift\` and \`node packages/anthropic-multi-account/scripts/check-claude-code-static-oauth-drift.mjs\` both report \`drift: false\`."
            echo ""
            echo "### Current status"
            echo ""
            echo "- Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- Scan target version: \`${CC_VERSION}\`"
            echo ""
            echo "### Authorize probe report"
            echo '```json'
            cat probe-report.json
            echo '```'
            echo ""
            echo "### Raw drift report"
            echo '```json'
            cat drift-report.json
            echo '```'
          } > issue-body.md

          if [ -z "$EXISTING" ]; then
            gh issue create \
              --title "$TITLE" \
              --label fingerprint-drift \
              --body-file issue-body.md
          else
            echo "Issue #$EXISTING already open; appending a new run as a comment."
            gh issue comment "$EXISTING" --body-file issue-body.md
          fi

      - name: Close resolved drift issues
        if: steps.drift.outputs.exit_code == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CC_VERSION="${{ steps.ver.outputs.cc_version }}"
          TITLE_MATCH="Fingerprint drift detected: Claude Code v${CC_VERSION}"
          NUMBERS=$(gh issue list --label fingerprint-drift --state open --search "in:title \"${TITLE_MATCH}\"" --json number --jq '.[].number')
          for n in $NUMBERS; do
            gh issue close "$n" --comment "Resolved — fingerprint-drift-watch ran clean against Claude Code v${CC_VERSION}. Bundled template now matches."
          done

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fingerprint-drift-report
          path: |
            drift-report.json
            drift-log.txt
            probe-report.json
            probe-log.txt
            auto-draft-result.json
          retention-days: 30
